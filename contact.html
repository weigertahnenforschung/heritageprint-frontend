<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us — HeritagePrint</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
                    },
                    colors: {
                        apple: {
                            gray: {
                                50: '#f5f5f7',
                                100: '#e8e8ed',
                                200: '#d2d2d7',
                                400: '#86868b',
                                800: '#1d1d1f',
                                900: '#000000'
                            },
                            blue: '#0066cc',
                            blueHover: '#0077ed'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-apple-gray-50 text-apple-gray-800 font-sans antialiased selection:bg-apple-blue selection:text-white flex flex-col min-h-screen">

    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-apple-gray-100 transition-all duration-300">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center space-x-2.5 group">
                <div class="w-7 h-7 bg-apple-blue flex items-center justify-center rounded-lg shadow-sm group-hover:scale-105 transition-transform duration-300">
                    <span class="text-white font-bold text-xs tracking-tight">H</span>
                </div>
                <span class="text-apple-gray-900 text-lg font-semibold tracking-tight">HeritagePrint</span>
            </a>
            <nav class="flex space-x-8 text-[13px] font-medium text-apple-gray-400">
                <a href="index.html" class="hover:text-apple-gray-900 transition-colors duration-200">Home</a>
            </nav>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center px-6 py-12">
        <div class="max-w-md w-full bg-white rounded-3xl border border-apple-gray-100 shadow-xs p-8 sm:p-10 transition-all">
            
            <div class="text-center space-y-2 mb-8">
                <h1 class="text-2xl sm:text-3xl font-bold tracking-tight text-apple-gray-900">Get in touch</h1>
                <p class="text-apple-gray-400 text-sm font-normal">Have questions about your family tree data? Drop a line below.</p>
            </div>

            <form id="contactForm" class="space-y-6">
                <div>
                    <label for="email" class="block text-xs font-semibold text-apple-gray-900 mb-2 uppercase tracking-wider">Your Email</label>
                    <input type="email" id="email" required placeholder="name@example.com"
                        class="w-full px-4 py-3 bg-apple-gray-50 border border-apple-gray-100 rounded-xl text-sm focus:outline-none focus:border-apple-blue focus:bg-white transition-all text-apple-gray-900 placeholder-apple-gray-200" />
                </div>

                <div>
                    <label for="message" class="block text-xs font-semibold text-apple-gray-900 mb-2 uppercase tracking-wider">Your Inquiry</label>
                    <textarea id="message" required rows="5" placeholder="How can we help preserve your history?"
                        class="w-full px-4 py-3 bg-apple-gray-50 border border-apple-gray-100 rounded-xl text-sm focus:outline-none focus:border-apple-blue focus:bg-white transition-all text-apple-gray-900 placeholder-apple-gray-200 resize-none"></textarea>
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full py-3 bg-apple-blue text-white font-medium text-sm hover:bg-apple-blueHover transition-all rounded-xl shadow-xs text-center flex items-center justify-center space-x-2">
                    <span>Send Message</span>
                </button>
            </form>

            <div id="statusMessage" class="mt-6 text-sm text-center font-medium hidden"></div>

        </div>
    </main>

    <script>
        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const message = document.getElementById('message').value;
            const submitBtn = document.getElementById('submitBtn');
            const statusPanel = document.getElementById('statusMessage');

            // Set Loading UI State
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span>Sending...</span>';
            statusPanel.classList.add('hidden');

            try {
             const response = await fetch('https://heritageprint-backend.onrender.com/contact-submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, message })
            });

                if (response.ok) {
                    statusPanel.className = "mt-6 text-sm text-center font-medium text-emerald-600 bg-emerald-50/50 border border-emerald-100 py-3 rounded-xl";
                    statusPanel.textContent = "Thank you! Your message has been sent successfully.";
                    document.getElementById('contactForm').reset();
                } else {
                    throw new Error();
                }
            } catch (err) {
                statusPanel.className = "mt-6 text-sm text-center font-medium text-rose-600 bg-rose-50/50 border border-rose-100 py-3 rounded-xl";
                statusPanel.textContent = "Oops! Something went wrong. Please try again later.";
            } finally {
                // Reset UI Action Controls
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>Send Message</span>';
                statusPanel.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
