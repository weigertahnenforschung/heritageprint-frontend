<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeritagePrint</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
                    },
                    colors: {
                        apple: {
                            gray: {
                                50: '#f5f5f7',
                                100: '#e8e8ed',
                                200: '#d2d2d7',
                                400: '#86868b',
                                800: '#1d1d1f',
                                900: '#000000'
                            },
                            blue: '#0066cc',
                            blueHover: '#0077ed'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: var(--font-body);
            color: var(--text-main);
            background-color: var(--bg-main);
        }
    </style>
</head>
<body>
    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-apple-gray-100 transition-all duration-300">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center space-x-2.5 group">
                <div class="w-7 h-7 bg-apple-blue flex items-center justify-center rounded-lg shadow-sm group-hover:scale-105 transition-transform duration-300">
                    <span class="text-white font-bold text-xs tracking-tight">HP</span>
                </div>
                <span class="text-apple-gray-900 text-lg font-semibold tracking-tight">HeritagePrint</span>
            </a>

            <nav class="hidden md:flex space-x-8 text-[13px] font-medium text-apple-gray-400">
                <a href="index.html" class="hover:text-apple-gray-900 transition-colors duration-200">Home</a>
                <a href="#" class="hover:text-apple-gray-900 transition-colors duration-200">Services</a>
                <a href="#" class="hover:text-apple-gray-900 transition-colors duration-200">About</a>
            </nav>

            <div class="flex items-center space-x-4">
                <button onclick="toggleMobileMenu()" class="md:hidden p-2 text-apple-gray-400 hover:text-apple-gray-900" aria-label="Toggle Navigation">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                </button>
            </div>
        </div>

        <div id="mobile-menu" class="hidden md:hidden bg-white border-b border-apple-gray-100 px-6 py-4 space-y-3">
            <a href="index.html" onclick="toggleMobileMenu()" class="block py-2 text-apple-gray-400 hover:text-apple-gray-900 text-sm">Home</a>
            <a href="#" onclick="toggleMobileMenu()" class="block py-2 text-apple-gray-400 hover:text-apple-gray-900 text-sm">Services</a>
            <a href="#" onclick="toggleMobileMenu()" class="block py-2 text-apple-gray-400 hover:text-apple-gray-900 text-sm">About</a>
        </div>
    </header>

    <script>
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        }
    </script>
</body>
</html>
