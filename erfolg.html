<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zahlung erfolgreich – Genealogie Pro</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&display=swap">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 500px; }
        h1 { color: #10b981; margin-bottom: 12px; }
        p { color: #64748b; font-size: 1rem; line-height: 1.6; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #10b981; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <div class="loader"></div>
        <h1>Vielen Dank für Ihre Bestellung!</h1>
        <p>Ihre Zahlung war erfolgreich. Unsere KI berechnet nun das hochauflösende Druck-Meisterwerk (Dauer ca. 2–3 Minuten).</p>
        <p><strong>Sie erhalten den Download-Link sowie die Bestellbestätigung in wenigen Minuten per E-Mail.</strong> Schließen Sie dieses Fenster beruhigt.</p>
    </div>
</body>
</html>
