<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genealogie Pro – Ihr KI-Stammbaum Studio</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap');

        :root {
            --primary: #1e293b;
            --primary-light: #334155;
            --accent: #d97706;
            --accent-hover: #b45309;
            --accent-ai: #7c3aed;
            --accent-ai-hover: #6d28d9;
            --bg-main: #f1f5f9;
            --sidebar-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --input-bg: #f8fafc;
            --parchment: #fdfbf7;

            --font-title: 'Cinzel', serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
            --font-canvas: 'EB Garamond', serif;
        }

        body {
            margin: 0;
            font-family: var(--font-body);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            background-color: var(--bg-main);
            overflow: hidden;
        }

        /* --- SIDEBAR LAYOUT (DESKTOP) --- */
        #sidebar {
            width: 360px;
            min-width: 360px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 24px;
            box-shadow: 4px 0 24px rgba(15, 23, 42, 0.05);
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .logo-area h1 {
            margin: 0;
            font-family: var(--font-title);
            font-size: 1.4rem;
            color: var(--primary);
            letter-spacing: 1px;
        }
        .logo-area p {
            margin: 4px 0 0 0;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* --- UX CARD STEPPERS --- */
        .step-card {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            transition: all 0.2s ease;
        }
        .step-card:focus-within {
            border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(217, 119, 6, 0.08);
        }
        .step-card h2 {
            margin: 0;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .step-card h2 span {
            background: var(--bg-main);
            color: var(--primary);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .control-group { display: flex; flex-direction: column; gap: 6px; position: relative; width: 100%; }
        .row { display: flex; gap: 12px; width: 100%; }
        .row > div { flex: 1; display: flex; flex-direction: column; gap: 6px; }

        label { font-size: 0.8rem; color: var(--primary); font-weight: 500; }

        /* --- FORM ELEMENTS --- */
        input[type="text"], input[type="number"], select {
            width: 100%; box-sizing: border-box; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border-color);
            background-color: var(--input-bg); color: var(--text-main); font-size: 0.9rem; transition: all 0.2s;
            font-family: inherit;
        }
        input:focus, select:focus {
            border-color: var(--accent);
            background-color: #fff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(217, 119, 6, 0.15);
        }

        /* Custom File Upload Styling */
        .file-upload-wrapper {
            position: relative;
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            background: var(--input-bg);
            transition: all 0.2s;
        }
        .file-upload-wrapper:hover {
            border-color: var(--accent);
            background: #fff;
        }
        .file-upload-wrapper input[type="file"] {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;
        }
        .file-upload-text { font-size: 0.85rem; color: var(--text-muted); }
        .file-upload-text strong { color: var(--accent); }

        /* Sliders */
        .slider-container { display: flex; flex-direction: column; gap: 4px; }
        .slider-row { display: flex; align-items: center; gap: 12px; }
        input[type="range"] {
            flex: 1; accent-color: var(--accent); height: 6px; border-radius: 3px; background: var(--border-color); cursor: pointer;
        }
        .slider-value { font-size: 0.8rem; color: var(--accent); min-width: 32px; font-weight: 600; text-align: right; }

        /* Checkboxes */
        .checkbox-row { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
        .checkbox-row input[type="checkbox"] {
            width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; margin: 0;
        }
        .checkbox-row label { font-size: 0.85rem; color: var(--primary-light); cursor: pointer; font-weight: normal; }

        /* Search Results Popovers */
        #search-results, #style-results {
            position: absolute; top: 100%; left: 0; right: 0; background: #ffffff;
            border: 1px solid var(--border-color); box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-height: 200px; overflow-y: auto; display: none; z-index: 100; border-radius: 8px; margin-top: 4px;
        }
        .search-item, .style-item { padding: 12px; cursor: pointer; border-bottom: 1px solid var(--border-color); font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center;}
        .search-item:last-child, .style-item:last-child { border-bottom: none; }
        .search-item:hover, .style-item:hover { background: var(--input-bg); color: var(--accent); }
        .search-item small { color: var(--text-muted); font-size: 0.75rem; }

        /* --- BUTTONS --- */
        button {
            font-family: var(--font-body); font-weight: 600; font-size: 0.9rem; padding: 12px;
            border-radius: 8px; border: none; cursor: pointer; transition: all 0.2s ease;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        button.main { background-color: var(--accent); color: white; width: 100%; }
        button.main:hover { background-color: var(--accent-hover); }

        button.ai-btn { background-color: var(--accent-ai); color: white; width: 100%; }
        button.ai-btn:hover { background-color: var(--accent-ai-hover); }

        button.secondary { background-color: var(--bg-main); color: var(--primary-light); font-size: 0.8rem; padding: 10px; }
        button.secondary:hover { background-color: var(--border-color); color: var(--primary); }

        /* --- CANVAS WORKSPACE --- */
        #viewport-container { flex-grow: 1; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        #top-ruler { height: 24px; background: #e2e8f0; border-bottom: 1px solid #cbd5e1; position: relative; margin-left: 24px; }
        #main-area { display: flex; flex-grow: 1; position: relative; overflow: hidden; }
        #left-ruler { width: 24px; background: #e2e8f0; border-right: 1px solid #cbd5e1; position: relative; }

        #workspace { flex-grow: 1; position: relative; cursor: grab; background-image: radial-gradient(#cbd5e1 1.5px, transparent 1.5px); background-size: 24px 24px; overflow: hidden; }
        #workspace:active { cursor: grabbing; }

        #a4-canvas {
            background-color: var(--parchment); box-shadow: 0 20px 50px rgba(15, 23, 42, 0.15);
            position: absolute; transform-origin: 0 0; border: 1px solid #94a3b8; border-radius: 4px;
        }

        .ruler-tick { position: absolute; font-size: 9px; color: #64748b; border-left: 1px solid #cbd5e1; height: 100%; padding-left: 3px; pointer-events: none; }
        .ruler-tick-v { position: absolute; font-size: 9px; color: #64748b; border-top: 1px solid #cbd5e1; width: 100%; padding-top: 3px; pointer-events: none; }

        /* --- MODAL OVERLAYS --- */
        #ai-overlay {
            display: none; position: absolute; inset: 0; background: rgba(15, 23, 42, 0.95);
            z-index: 1000; align-items: center; justify-content: center; flex-direction: column; padding: 24px; box-sizing: border-box;
        }
        #ai-image-result { max-width: 85%; max-height: 55%; border-radius: 8px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); display: none; }
        .close-btn { padding: 12px 24px; background: var(--primary-light); color: white; border: none; cursor: pointer; font-weight: 600; border-radius: 8px; display: none; }
        .close-btn:hover { background: var(--primary); }
        #loader { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--accent-ai); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        #ai-status { color: white; font-size: 1.25rem; font-family: var(--font-body); font-weight: 400; text-align: center; max-width: 600px; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #style-load-info { font-size: 0.75rem; margin-top: 4px; font-weight: 500; }

        /* Color Palette Engine */
        .color-palette { display: flex; gap: 10px; margin-top: 4px; justify-content: center;}
        .color-option {
            width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
            border: 3px solid transparent; transition: all 0.2s; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1);
        }
        .color-option:hover { transform: scale(1.1); }
        .color-option.selected { border-color: #fff; box-shadow: 0 0 0 2px var(--accent-ai); transform: scale(1.05); }

        /* -----------------------------------------
           📱 MOBILE & TABLET OPTIMIZATIONS (MEDIA QUERY)
           ----------------------------------------- */
        @media (max-width: 768px) {
            body {
                flex-direction: column; /* Stapelt Elemente vertikal */
            }

            /* Stammbaum wandert nach Oben */
            #viewport-container {
                height: 45vh; /* Nimmt 45% des Bildschirms ein */
                width: 100%;
                flex-grow: 0;
                border-bottom: 2px solid var(--border-color);
            }

            /* Lineale auf Mobile ausblenden für mehr Platz */
            #top-ruler, #left-ruler {
                display: none !important;
            }
            #main-area {
                height: 100%;
            }

            /* Einstellungs-Optionen wandern nach Unten */
            #sidebar {
                width: 100%;
                height: 55vh; /* Nimmt restliche 55% ein */
                border-right: none;
                border-top: 1px solid var(--border-color);
                box-shadow: 0 -4px 24px rgba(15, 23, 42, 0.05);
                padding: 16px;
                gap: 16px;
            }

            .logo-area {
                display: flex;
                justify-content: space-between;
                align-items: center;
                border-bottom: 1px solid var(--border-color);
                padding-bottom: 8px;
            }
            .logo-area p { margin: 0; }

            /* Buttons und Inputs für Touch-Bedienung optimieren */
            button, input[type="text"], input[type="number"], select {
                padding: 12px 16px;
                font-size: 1rem;
            }

            /* AI Overlay für kleine Screens anpassen */
            #ai-image-result {
                max-width: 95%;
                max-height: 40%;
            }
            #ai-status {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="logo-area">
            <h1>Genealogie Pro</h1>
            <p>KI-Stammbaum Studio</p>
        </div>

        <!-- STEP 1: DATA IMPORT -->
        <div class="step-card">
            <h2><span>1</span> Datenquelle</h2>
            <div class="control-group">
                <label>Dokumententitel</label>
                <input type="text" id="doc-title-input" placeholder="z.B. Chronik der Familie Maier">
            </div>
            <div class="control-group">
                <label>GEDCOM-Datei hochladen</label>
                <div class="file-upload-wrapper">
                    <div class="file-upload-text" id="upload-label-text">Datei herziehen oder <strong>durchsuchen</strong></div>
                    <input type="file" id="gedcom-upload" accept=".ged">
                </div>
            </div>
            <div id="search-container" class="control-group" style="display:none;">
                <label>Ausgangsperson (Proband) suchen</label>
                <input type="text" id="proband-search" placeholder="Name eingeben..." autocomplete="off">
                <div id="search-results"></div>
                <input type="hidden" id="selected-indi-id">
            </div>
        </div>

        <!-- STEP 2: TREE ARCHITECTURE -->
        <div class="step-card">
            <h2><span>2</span> Struktur & Layout</h2>
            <div class="row">
                <div>
                    <label>Generationen</label>
                    <input type="number" id="gen-depth" min="1" max="15" value="4">
                </div>
                <div>
                    <label>Richtung</label>
                    <select id="lineage-mode">
                        <option value="ancestors">Vorfahren</option>
                        <option value="descendants">Nachkommen</option>
                    </select>
                </div>
            </div>

            <div class="control-group">
                <label>Wachstumsrichtung</label>
                <select id="tree-orientation">
                    <option value="up">Nach oben wachsen lassen</option>
                    <option value="down">Nach unten wachsen lassen</option>
                </select>
            </div>

            <div class="slider-container">
                <label>Box- & Schriftgröße</label>
                <div class="slider-row">
                    <input type="range" id="box-scale" min="0.5" max="3.5" step="0.1" value="1.0">
                    <span class="slider-value" id="box-scale-value">1.0×</span>
                </div>
            </div>

            <div class="checkbox-row">
                <input type="checkbox" id="show-dates" checked>
                <label for="show-dates">Lebensdaten anzeigen (* / †)</label>
            </div>

            <input type="hidden" id="format-preset" value="optimal">
            <input type="hidden" id="sheet-w" value="29.7">
            <input type="hidden" id="sheet-h" value="21.0">

            <button class="main" id="generate-btn"> Stammbaum generieren</button>
        </div>

        <!-- STEP 3: AI STYLING -->
        <div class="step-card">
            <h2><span>3</span> KI Design Studio</h2>
            <div class="control-group">
                <label>Künstlerischer Kunststil</label>
                <input type="text" id="style-search" placeholder="Historischer Stil suchen..." autocomplete="off" readonly>
                <div id="style-results"></div>
                <input type="hidden" id="selected-style-prompt">
                <div id="style-load-info">Stile werden geladen...</div>
            </div>
            <button class="ai-btn" id="design-btn">🎨 Design transformieren (KI)</button>
        </div>

        <!-- CLASSIC EXPORT ROW & BUY ACTION -->
        <div class="control-group" style="margin-top: auto; padding-top: 10px; border-top: 1px solid var(--border-color);">
            <label style="margin-bottom: 6px;">Klassischer Export</label>
            <div class="row" style="margin-bottom: 12px;">
                <button class="secondary" id="export-png">Bild (PNG)</button>
                <button class="secondary" id="export-svg">Vektor (SVG)</button>
            </div>

            <!-- Der neue, prominente Kaufen-Button -->
            <button class="main" id="checkout-btn" style="background-color: #10b981; width: 100%;">
                🛒 Stammbaum drucken / kaufen
            </button>
        </div>

        <div id="status" style="font-size: 0.75rem; color: var(--text-muted); text-align: center; font-weight: 500;">Bereit.</div>
    </div>

    <div id="viewport-container">
        <div id="top-ruler"></div>
        <div id="main-area">
            <div id="left-ruler"></div>
            <div id="workspace">
                <div id="a4-canvas">
                    <svg id="tree-svg" xmlns="http://www.w3.org/2000/svg"></svg>
                </div>
            </div>
        </div>

        <!-- MODAL SYSTEM -->
        <div id="ai-overlay">
            <div id="loader"></div>
            <div id="ai-status">Generiere historisches Meisterwerk...</div>

            <img id="ai-debug-result" src="" alt="Erkannte Layout-Knoten" style="display:none; max-width:85%; max-height:55%; border:3px solid #22c55e; border-radius:8px;" />
            <div id="debug-info" style="display:none; color:#22c55e; font-size:0.85rem; font-family:monospace; margin-bottom: 12px;"></div>

            <img id="ai-image-result" src="" alt="KI-generierter Stammbaum" />

            <div id="color-palette-container" style="display:none; flex-direction:column; gap:8px; align-items:center; margin-top: 16px;">
                <label style="color:white; font-size:0.9rem;">Farbschema anpassen (aus Ihrem Bild extrahiert)</label>
                <div class="color-palette" id="color-palette"></div>
            </div>

            <div id="edit-area" style="display:none; width:100%; max-width:600px; flex-direction:column; gap:8px; margin-top: 16px;">
                <textarea id="edit-prompt" rows="2" placeholder="Was soll geändert werden? z.B.: 'Füge unten eine historische Ansicht von Regensburg hinzu'" style="width:100%; box-sizing:border-box; padding:12px; background:#1e293b; color:white; border:1px solid var(--accent-ai); border-radius:8px; font-size:0.9rem; font-family: inherit; resize:none;"></textarea>
            </div>

            <div style="display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-top: 20px;">
                <button class="close-btn" id="apply-text-btn" style="display:none; background:#22c55e;">✏️ Texte in Boxen schreiben</button>
                <button class="close-btn" id="apply-color-btn" style="display:none; background:#3b82f6;">🎨 Farbe anwenden</button>
                <button class="close-btn" id="download-btn" style="display:none; background:#0284c7;">⬇️ Design herunterladen</button>
                <button class="close-btn" id="edit-btn" style="display:none; background:var(--accent-ai);">✏️ Per KI anpassen</button>
                <button class="close-btn" id="edit-confirm-btn" style="display:none; background:var(--accent);">🚀 Änderungen berechnen</button>
                <button class="close-btn" id="close-overlay" style="display:none;">Zurück zum Editor</button>
            </div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        let rawData = { individuals: {}, families: {} };
        let scale = 0.8;
        let pX = 80, pY = 80;
        const PX_PER_CM = 37.795;
        let activeDescendants = [];
        let currentBoxW = 0, currentBoxH = 0, currentNodes = [];
        let dominantColors = [];
        let selectedBoxColor = '#ffffff';
        let finalCompositedImage = null;

        // Dynamic setup for mobile screens right on load
        if (window.innerWidth <= 768) {
            scale = 0.35;
            pX = 20;
            pY = 40;
        }

        const sidebar = document.getElementById('sidebar');
        sidebar.addEventListener('mousedown', (e) => { e.stopPropagation(); });

        const uploadInput = document.getElementById('gedcom-upload');
        const uploadLabelText = document.getElementById('upload-label-text');
        const searchInput = document.getElementById('proband-search');
        const resultsDiv = document.getElementById('search-results');
        const hiddenIdInput = document.getElementById('selected-indi-id');
        const canvas = document.getElementById('a4-canvas');
        const workspace = document.getElementById('workspace');
        const svgElement = document.getElementById('tree-svg');
        const svg = d3.select("#tree-svg");
        const statusEl = document.getElementById('status');
        const colorPalette = document.getElementById('color-palette');
        const colorPaletteContainer = document.getElementById('color-palette-container');

        const boxScaleSlider = document.getElementById('box-scale');
        const boxScaleValue = document.getElementById('box-scale-value');
        boxScaleSlider.addEventListener('input', () => {
            boxScaleValue.textContent = parseFloat(boxScaleSlider.value).toFixed(1) + '×';
            if (hiddenIdInput.value) renderTree();
        });
        document.getElementById('show-dates').addEventListener('change', () => {
            if (hiddenIdInput.value) renderTree();
        });

        function extractDominantColors(imgElement, count = 5) {
            return new Promise((resolve) => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = imgElement.naturalWidth;
                canvas.height = imgElement.naturalHeight;
                ctx.drawImage(imgElement, 0, 0);

                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const pixels = imageData.data;
                const pixelCount = canvas.width * canvas.height;

                const sampleSize = Math.min(10000, pixelCount);
                const step = Math.max(1, Math.floor(pixelCount / sampleSize));

                const colorCounts = {};
                for (let i = 0; i < pixelCount; i += step) {
                    const offset = i * 4;
                    const r = pixels[offset];
                    const g = pixels[offset + 1];
                    const b = pixels[offset + 2];
                    const a = pixels[offset + 3];

                    if (a < 128) continue;

                    const roundedR = Math.round(r / 16) * 16;
                    const roundedG = Math.round(g / 16) * 16;
                    const roundedB = Math.round(b / 16) * 16;
                    const colorKey = `${roundedR},${roundedG},${roundedB}`;

                    colorCounts[colorKey] = (colorCounts[colorKey] || 0) + 1;
                }

                const sortedColors = Object.entries(colorCounts)
                    .sort((a, b) => b[1] - a[1])
                    .slice(0, count)
                    .map(([colorKey]) => {
                        const [r, g, b] = colorKey.split(',').map(Number);
                        return `rgb(${r}, ${g}, ${b})`;
                    });

                const hexColors = sortedColors.map(rgb => {
                    const match = rgb.match(/^rgb\((\d+),\s*(\d+),\s*(\d+)\)$/);
                    if (match) {
                        const r = parseInt(match[1]).toString(16).padStart(2, '0');
                        const g = parseInt(match[2]).toString(16).padStart(2, '0');
                        const b = parseInt(match[3]).toString(16).padStart(2, '0');
                        return `#${r}${g}${b}`;
                    }
                    return '#ffffff';
                });

                const filteredColors = hexColors.filter(color => color.toLowerCase() !== '#ff0000');
                resolve(filteredColors);
            });
        }

        function updateColorPalette(colors) {
            dominantColors = colors;
            colorPalette.innerHTML = '';
            dominantColors.forEach(color => {
                const option = document.createElement('div');
                option.className = 'color-option';
                option.style.backgroundColor = color;
                option.onclick = () => {
                    document.querySelectorAll('.color-option').forEach(el => el.classList.remove('selected'));
                    option.classList.add('selected');
                    selectedBoxColor = color;
                };
                colorPalette.appendChild(option);
            });
            if (colorPalette.children.length > 0) {
                colorPalette.children[0].classList.add('selected');
                selectedBoxColor = dominantColors[0];
            }
        }

        let stylesDB = [];
        const styleSearch = document.getElementById('style-search');
        const styleResults = document.getElementById('style-results');
        const hiddenStylePrompt = document.getElementById('selected-style-prompt');
        const styleLoadInfo = document.getElementById('style-load-info');

        fetch('stile.json')
            .then(res => { if (!res.ok) throw new Error(`HTTP ${res.status}`); return res.json(); })
            .then(data => {
                if (!Array.isArray(data) || data.length === 0) throw new Error('Datei leer');
                stylesDB = data;
                styleSearch.readOnly = false;
                styleSearch.placeholder = `Aus ${stylesDB.length} Stilen wählen...`;
                styleLoadInfo.textContent = `✅ ${stylesDB.length} Designstile geladen.`;
                styleLoadInfo.style.color = '#10b981';

        function parseGedcom(text) {
            rawData = { individuals: {}, families: {} };
            const lines = text.split('\n');
            let lastId = ''; let lastTag = '';
            lines.forEach(line => {
                const parts = line.trim().split(' ');
                if (parts[0] === '0') {
                    if (parts[2] === 'INDI') {
                        lastId = parts[1].replace(/@/g, '');
                        rawData.individuals[lastId] = { id: lastId, name: 'Unbekannt', birth: '', death: '', father: null, mother: null, children: [] };
                        lastTag = 'INDI';
                    } else if (parts[2] === 'FAM') {
                        lastId = parts[1].replace(/@/g, '');
                        rawData.families[lastId] = { husband: null, wife: null, children: [] };
                        lastTag = 'FAM';
                    }
                } else if (parts[0] === '1') {
                    if (parts[1] === 'NAME' && lastTag === 'INDI') rawData.individuals[lastId].name = parts.slice(2).join(' ').replace(/\//g, '');
                    else if (parts[1] === 'BIRT' && lastTag === 'INDI') lastTag = 'BIRT';
                    else if (parts[1] === 'DEAT' && lastTag === 'INDI') lastTag = 'DEAT';
                    else if (parts[1] === 'HUSB' && lastTag === 'FAM') rawData.families[lastId].husband = parts[2].replace(/@/g, '');
                    else if (parts[1] === 'WIFE' && lastTag === 'FAM') rawData.families[lastId].wife = parts[2].replace(/@/g, '');
                    else if (parts[1] === 'CHIL' && lastTag === 'FAM') rawData.families[lastId].children.push(parts[2].replace(/@/g, ''));
                } else if (parts[0] === '2' && parts[1] === 'DATE') {
                    if (lastTag === 'BIRT') { rawData.individuals[lastId].birth = parts.slice(2).join(' '); lastTag = 'INDI'; }
                    if (lastTag === 'DEAT') { rawData.individuals[lastId].death = parts.slice(2).join(' '); lastTag = 'INDI'; }
                }
            });
            Object.values(rawData.families).forEach(f => {
                f.children.forEach(cId => {
                    if (rawData.individuals[cId]) {
                        rawData.individuals[cId].father = f.husband;
                        rawData.individuals[cId].mother = f.wife;
                    }
                    if (f.husband && rawData.individuals[f.husband]) rawData.individuals[f.husband].children.push(cId);
                    if (f.wife && rawData.individuals[f.wife]) rawData.individuals[f.wife].children.push(cId);
                });
            });
        }

        let _measureCanvas = null;
        function measureText(text, fontSize, bold = false) {
            if (!_measureCanvas) _measureCanvas = document.createElement('canvas');
            const ctx = _measureCanvas.getContext('2d');
            ctx.font = `${bold ? 'bold ' : ''}${fontSize}px Georgia, serif`;
            return ctx.measureText(text).width;
        }

        function wrapText(text, maxWidth, fontSize, bold = false) {
            const words = text.split(' ');
            const lines = [];
            let current = '';

            for (let i = 0; i < words.length; i++) {
                let word = words[i];
                const test = current ? current + ' ' + word : word;
                if (measureText(test, fontSize, bold) <= maxWidth) {
                    current = test;
                    continue;
                }
                if (current) { lines.push(current); current = ''; }
                while (measureText(word, fontSize, bold) > maxWidth) {
                    const hyphenated = hyphenateToFit(word, maxWidth, fontSize, bold);
                    lines.push(hyphenated.head);
                    word = hyphenated.tail;
                }
                current = word;
            }
            if (current) lines.push(current);
            return lines;
        }

        function hyphenateToFit(word, maxWidth, fontSize, bold) {
            const vowels = 'AEIOUaeiouÄÖÜäöü';
            let splitAt = word.length - 1;
            for (let i = word.length - 1; i >= 1; i--) {
                if (measureText(word.substring(0, i) + '-', fontSize, bold) <= maxWidth) {
                    splitAt = i;
                    break;
                }
            }
            for (let j = splitAt; j >= Math.max(1, splitAt - 3); j--) {
                if (vowels.includes(word[j - 1])) { splitAt = j; break; }
            }
            return { head: word.substring(0, splitAt) + '-', tail: word.substring(splitAt) };
        }

        function buildHierarchy(id, curD, maxD, mode) {
            const p = rawData.individuals[id];
            if (!p || curD >= maxD) return { name: p ? p.name : '?', birth: p?.birth, death: p?.death };
            let children = [];
            if (mode === 'ancestors') {
                if (p.father) children.push(buildHierarchy(p.father, curD + 1, maxD, mode));
                if (p.mother) children.push(buildHierarchy(p.mother, curD + 1, maxD, mode));
            } else {
                p.children.forEach(cId => children.push(buildHierarchy(cId, curD + 1, maxD, mode)));
            }
            return { name: p.name, birth: p.birth, death: p.death, children: children.length > 0 ? children : null };
        }

        function renderTree() {

            const LINE_GAP = Math.round(4 * boxScale);
            const CELL_W = Math.round(210 * boxScale);
            const boxW = Math.round(180 * boxScale);
            const textAreaW = boxW - PAD_H * 2;

            const NAME_LINES = 2;
            const DATE_LINES = showDates ? 2 : 0;

            const nameBlockH = NAME_LINES * nameFontSize * 1.35;

            const gapH = (showDates && DATE_LINES > 0) ? LINE_GAP : 0;

            const CELL_H = boxH + Math.round(70 * boxScale);

            const root = d3.hierarchy(data);

            const orientation = document.getElementById('tree-orientation').value;
            const treeLayout = d3.tree().nodeSize([CELL_W, CELL_H]);
            treeLayout(root);

            const xCoords = root.descendants().map(d => d.x);
            const yCoords = root.descendants().map(d => orientation === 'up' ? -d.y : d.y);
            const minX = Math.min(...xCoords); const maxX = Math.max(...xCoords);
            const minY = Math.min(...yCoords); const maxY = Math.max(...yCoords);

            document.getElementById('sheet-w').value = ((maxX - minX + CELL_W + 100) / PX_PER_CM).toFixed(1);
            document.getElementById('sheet-h').value = ((maxY - minY + CELL_H + 250) / PX_PER_CM).toFixed(1);

            const sW = parseFloat(document.getElementById('sheet-w').value) * PX_PER_CM;
            const sH = parseFloat(document.getElementById('sheet-h').value) * PX_PER_CM;
            canvas.style.width = sW + 'px';
            canvas.style.height = sH + 'px';
            svg.attr('width', sW).attr('height', sH);

            svg.append('rect').attr('width', sW).attr('height', sH).attr('fill', '#fdfbf7');

            const docTitle = document.getElementById('doc-title-input').value;
            if (docTitle) {
                svg.append('text')
                    .attr('class', 'doc-title')
                    .attr('x', sW / 2).attr('y', 60)
                    .attr('text-anchor', 'middle')
                    .attr('font-family', 'Georgia, serif')
                    .attr('font-size', '36px')
                    .attr('font-weight', 'bold')
                    .attr('fill', '#1a1a1a')
                    .text(docTitle.toUpperCase());
            }

            const g = svg.append('g').attr('id', 'main-group');
            const offsetX = (sW / 2) - ((maxX + minX) / 2);
            const offsetY = orientation === 'up' ? sH - 100 : 180;
            g.attr('transform', `translate(${offsetX}, ${offsetY})`);

            currentBoxW = boxW;
            currentBoxH = boxH;
            currentNodes = root.descendants()
                .slice()
                .sort((a, b) => a.depth !== b.depth ? a.depth - b.depth : a.x - b.x)
                .map(d => ({
                    svgX: d.x + offsetX,
                    svgY: (orientation === 'up' ? -d.y : d.y) + offsetY,
                    depth: d.depth,
                    data: d.data
                }));

            g.selectAll('.link').data(root.links()).enter().append('path')
                .attr('fill', 'none')
                .attr('stroke', '#4a3c31')
                .attr('stroke-width', '2.5px')
                .attr('d', d3.linkVertical().x(d => d.x).y(d => orientation === 'up' ? -d.y : d.y));

            const node = g.selectAll('.node').data(root.descendants()).enter().append('g')
                .attr('class', 'node-g')
                .attr('transform', d => `translate(${d.x},${orientation === 'up' ? -d.y : d.y})`);

            node.append('rect')
                .attr('class', 'node-box')
                .attr('width', boxW).attr('height', boxH)
                .attr('x', -boxW / 2).attr('y', -boxH / 2)
                .attr('rx', 3)
                .attr('fill', '#ffffff')
                .attr('stroke', '#4a3c31')
                .attr('stroke-width', '2.5px');

            node.each(function(d) {
                const gEl = d3.select(this);
                const name = (d.data.name || '?').toUpperCase();

                let nameLines = wrapText(name, textAreaW, nameFontSize, true);
                if (nameLines.length > 2) {
                    nameLines = [nameLines[0], nameLines.slice(1).join(' ')];
                }

                const actualNameH = nameLines.length * nameFontSize * 1.35;
                const actualDateH = showDates ? DATE_LINES * dateFontSize * 1.4 : 0;
                const actualGap = showDates ? LINE_GAP : 0;
                const totalContentH = actualNameH + actualGap + actualDateH;

                let curY = -(totalContentH / 2) + nameFontSize * 0.85;

                nameLines.forEach(line => {
                    gEl.append('text')
                        .attr('class', 'node-text')
                        .attr('x', 0).attr('y', curY)
                        .attr('text-anchor', 'middle')
                        .attr('font-family', 'Georgia, serif')
                        .attr('font-size', nameFontSize + 'px')
                        .attr('font-weight', 'bold')
                        .attr('fill', '#1a1a1a')
                        .text(line);
                    curY += nameFontSize * 1.35;
                });

                if (showDates) {
                    curY += actualGap;
                    const birthStr = d.data.birth ? `* ${d.data.birth}` : '';
                    const deathStr = d.data.death ? `† ${d.data.death}` : '';

                    if (birthStr || deathStr) {
                        gEl.append('text')
                            .attr('class', 'node-text')
                            .attr('x', 0).attr('y', curY)
                            .attr('text-anchor', 'middle')
                            .attr('font-family', 'Georgia, serif')
                            .attr('font-size', dateFontSize + 'px')
                            .attr('font-style', 'italic')
                            .attr('fill', '#333333')
                            .text(birthStr || '');
                        curY += dateFontSize * 1.4;

                        gEl.append('text')
                            .attr('class', 'node-text')
                            .attr('x', 0).attr('y', curY)
                            .attr('text-anchor', 'middle')
                            .attr('font-family', 'Georgia, serif')
                            .attr('font-size', dateFontSize + 'px')
                            .attr('font-style', 'italic')
                            .attr('fill', '#333333')
                            .text(deathStr || '');
                    }
                }
            });

            if (window.innerWidth <= 768) {
                pX = (workspace.offsetWidth - sW * scale) / 2;
                pY = 30;
            } else {
                pX = 80; pY = 80;
            }

            updateT();
            statusEl.textContent = `✅ Stammbaum mit ${activeDescendants.length} Personen generiert.`;
        }

        function updateT() {
            canvas.style.transform = `translate(${pX}px, ${pY}px) scale(${scale})`;
            updateRulers();
        }

        let initialTouchDist = null;
        let initialTouchScale = null;

        workspace.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                initialTouchDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                initialTouchScale = scale;
            }
        });

        workspace.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && initialTouchDist) {
                e.preventDefault();
                const dist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                const factor = dist / initialTouchDist;
                scale = Math.min(Math.max(0.05, initialTouchScale * factor), 5);
                updateT();
            }
        }, { passive: false });

        workspace.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomSpeed = 0.0015;
            const delta = -e.deltaY;
            const newScale = Math.min(Math.max(0.05, scale + delta * zoomSpeed), 5);
            const rect = workspace.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            pX = mouseX - (mouseX - pX) * (newScale / scale);
            pY = mouseY - (mouseY - pY) * (newScale / scale);
            scale = newScale;
            updateT();
        }, { passive: false });

        let isDrag = false; let startX, startY;

        const dragStart = (clientX, clientY) => {
            isDrag = true; startX = clientX - pX; startY = clientY - pY;
        };
        const dragMove = (clientX, clientY) => {
            if (!isDrag) return;
            pX = clientX - startX; pY = clientY - startY;
            updateT();
        };

        workspace.addEventListener('mousedown', (e) => { if (e.button === 0) dragStart(e.clientX, e.clientY); });
        workspace.addEventListener('mousemove', (e) => dragMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', () => isDrag = false);

        workspace.addEventListener('touchstart', (e) => { if (e.touches.length === 1) dragStart(e.touches[0].clientX, e.touches[0].clientY); });
        workspace.addEventListener('touchmove', (e) => { if (e.touches.length === 1) dragMove(e.touches[0].clientX, e.touches[0].clientY); });
        window.addEventListener('touchend', () => isDrag = false);

        function svgToPngBase64(svgEl, maxPx = 800, stripNodeText = false) {
            return new Promise((resolve, reject) => {
                const origW = parseInt(svgEl.getAttribute('width')) || 800;
                const origH = parseInt(svgEl.getAttribute('height')) || 600;

                let outW, outH;
                if (origW >= origH) {
                    outW = Math.min(origW, maxPx);
                    outH = Math.round(outW * origH / origW);
                } else {
                    outH = Math.min(origH, maxPx);
                    outW = Math.round(outH * origW / origH);
                }

                const clone = svgEl.cloneNode(true);
                clone.querySelectorAll('path').forEach(path => {
                    path.setAttribute('stroke-width', '6px');
                    path.setAttribute('stroke', '#000000');
                });

                clone.querySelectorAll('.node-box').forEach(box => {
                    box.setAttribute('stroke-width', '4px');
                    box.setAttribute('fill', '#eeeeee');
                });

                if (stripNodeText) {
                    clone.querySelectorAll('.node-text').forEach(el => el.remove());
                }

                const ns = 'http://www.w3.org/2000/svg';
                const bgRect = document.createElementNS(ns, 'rect');
                bgRect.setAttribute('width', origW); bgRect.setAttribute('height', origH);
                bgRect.setAttribute('fill', '#ffffff');
                clone.insertBefore(bgRect, clone.firstChild);

                const svgStr = new XMLSerializer().serializeToString(clone);
                const blob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
                const blobUrl = URL.createObjectURL(blob);

                const img = new Image();
                img.onload = () => {
                    const tmpCanvas = document.createElement('canvas');
                    tmpCanvas.width = outW; tmpCanvas.height = outH;
                    const ctx = tmpCanvas.getContext('2d');
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, outW, outH);
                    ctx.drawImage(img, 0, 0, outW, outH);
                    URL.revokeObjectURL(blobUrl);
                    try {
                        const dataUrl = tmpCanvas.toDataURL('image/jpeg', 0.75);
                        resolve({ base64: dataUrl.split(',')[1], mimeType: 'image/jpeg', origW, origH, outW, outH });
                    } catch(e) { reject(new Error('Rendering failed: ' + e.message)); }
                };
                img.onerror = () => { URL.revokeObjectURL(blobUrl); reject(new Error('SVG data corruption.')); };
                img.src = blobUrl;
            });
        }

        function detectRedBoxes(aiUrl) {
            return new Promise((resolve, reject) => {
                const aiImg = new Image();
                aiImg.onload = () => {
                    try {
                        const aiW = aiImg.naturalWidth;
                        const aiH = aiImg.naturalHeight;
                        const tmpCanvas = document.createElement('canvas');
                        tmpCanvas.width = aiW; tmpCanvas.height = aiH;
                        const ctx = tmpCanvas.getContext('2d');
                        ctx.drawImage(aiImg, 0, 0);
                        const imgData = ctx.getImageData(0, 0, aiW, aiH);
                        const px = imgData.data;

                        const mask = new Uint8Array(aiW * aiH);
                        for (let i = 0; i < aiW * aiH; i++) {
                            if (px[i*4] > 180 && px[i*4+1] < 80 && px[i*4+2] < 80) {
                                mask[i] = 1;
                            }
                        }

                        const labels = new Int32Array(aiW * aiH).fill(-1);
                        const boxes = [];
                        let nextLabel = 0;

                        for (let y = 0; y < aiH; y++) {
                            for (let x = 0; x < aiW; x++) {
                                const idx = y * aiW + x;
                                if (mask[idx] !== 1 || labels[idx] !== -1) continue;

                                const label = nextLabel++;
                                boxes.push({ x1: x, y1: y, x2: x, y2: y, count: 0 });
                                const queue = [idx];
                                labels[idx] = label;
                                let head = 0;

                                while (head < queue.length) {
                                    const cur = queue[head++];
                                    const cx = cur % aiW;
                                    const cy = Math.floor(cur / aiW);
                                    const b = boxes[label];
                                    if (cx < b.x1) b.x1 = cx;
                                    if (cx > b.x2) b.x2 = cx;
                                    if (cy < b.y1) b.y1 = cy;
                                    if (cy > b.y2) b.y2 = cy;
                                    b.count++;

                                    for (const [nx, ny] of [[cx-1,cy],[cx+1,cy],[cx,cy-1],[cx,cy+1]]) {
                                        if (nx < 0 || nx >= aiW || ny < 0 || ny >= aiH) continue;
                                        const ni = ny * aiW + nx;
                                        if (mask[ni] === 1 && labels[ni] === -1) {
                                            labels[ni] = label;
                                            queue.push(ni);
                                        }
                                    }
                                }
                            }
                        }

                        const rawBoxes = boxes.filter(b => b.count >= 50).map(b => ({
                            x: b.x1, y: b.y1, w: b.x2 - b.x1 + 1, h: b.y2 - b.y1 + 1,
                            cx: (b.x1 + b.x2) / 2, cy: (b.y1 + b.y2) / 2,
                            area: (b.x2 - b.x1 + 1) * (b.y2 - b.y1 + 1),
                            aspectRatio: (b.x2 - b.x1 + 1) / (b.y2 - b.y1 + 1)
                        }));

                        const templateAspectRatio = currentBoxW / currentBoxH;
                        const aspectTolerance = 0.4;
                        const avgArea = rawBoxes.reduce((sum, b) => sum + b.area, 0) / rawBoxes.length;
                        const filteredBoxes = rawBoxes.filter(b => {
                            const areaOk = b.area >= 0.1 * avgArea;
                            const aspectOk = Math.abs(b.aspectRatio - templateAspectRatio) / templateAspectRatio <= aspectTolerance;
                            return areaOk && aspectOk;
                        });

                        const dbgCanvas = document.createElement('canvas');
                        dbgCanvas.width = aiW; dbgCanvas.height = aiH;
                        const dbgCtx = dbgCanvas.getContext('2d');
                        dbgCtx.drawImage(aiImg, 0, 0);
                        dbgCtx.strokeStyle = '#00ff00';
                        dbgCtx.lineWidth = Math.max(2, Math.round(aiW / 500));
                        for (const r of filteredBoxes) { dbgCtx.strokeRect(r.x, r.y, r.w, r.h); }

                        resolve({
                            debugDataUrl: dbgCanvas.toDataURL('image/png'),
                            deduped: filteredBoxes,
                            aiW, aiH
                        });
                    } catch (err) { reject(err); }
                };
                aiImg.onerror = () => reject(new Error('Error mapping geometry structure.'));
                aiImg.src = aiUrl;
            });
        }

        function getExpectedBoxCounts() {
            const total = currentNodes.length;
            const byDepth = {};
            for (const n of currentNodes) { byDepth[n.depth] = (byDepth[n.depth] || 0) + 1; }
            return { total, perGen: Object.keys(byDepth).map(Number).sort((a, b) => a - b).map(d => byDepth[d]) };
        }

        function clusterDetectedBoxesIntoRows(deduped) {
            const sortedByY = [...deduped].sort((a, b) => a.cy - b.cy);
            const detRows = [];
            const rowGap = deduped.length > 0 ? (deduped.reduce((s, r) => s + r.h, 0) / deduped.length) * 0.7 : 30;

            for (const box of sortedByY) {
                let placed = false;
                for (const row of detRows) {
                    if (Math.abs(box.cy - row.avgY) < rowGap) {
                        row.boxes.push(box);
                        row.avgY = row.boxes.reduce((s, b) => s + b.cy, 0) / row.boxes.length;
                        placed = true; break;
                    }
                }
                if (!placed) detRows.push({ avgY: box.cy, boxes: [box] });
            }
            detRows.sort((a, b) => a.avgY - b.avgY).forEach(row => row.boxes.sort((a, b) => a.cx - b.cx));
            return detRows;
        }

        function drawNodeTextToCanvas(ctx, det, nodeData, showDates) {
            const PAD_H = Math.max(3, det.w * 0.06);
            const textW = det.w - PAD_H * 2;
            const textH = det.h - Math.max(2, det.h * 0.08) * 2;
            const name = (nodeData.name || '?').toUpperCase();
            const birthStr = showDates && nodeData.birth ? `* ${nodeData.birth}` : '';
            const deathStr = showDates && nodeData.death ? `† ${nodeData.death}` : '';
            const hasDate = birthStr || deathStr;

            function tryLayout(nameFontSize) {
                const dateFontSize = nameFontSize * 0.78;
                ctx.font = `bold ${nameFontSize}px Georgia, serif`;
                let nameLines = wrapText(name, textW, nameFontSize, true);
                if (nameLines.length > 3) nameLines = [nameLines[0], nameLines[1], nameLines.slice(2).join(' ')];
                const nameH = nameLines.length * nameFontSize * 1.25;
                const dateH = hasDate ? (birthStr && deathStr ? 2 : 1) * dateFontSize * 1.3 + nameFontSize * 0.25 : 0;
                return { fits: nameH + dateH <= textH, nameLines, nameFontSize, dateFontSize };
            }

            let lo = 5, hi = Math.min(det.h * 0.55, det.w * 0.25, 48);
            let best = tryLayout(lo);
            for (let iter = 0; iter < 16; iter++) {
                const mid = (lo + hi) / 2; const res = tryLayout(mid);
                if (res.fits) { best = res; lo = mid; } else { hi = mid; }
            }

            const { nameLines, dateFontSize } = best; const nameFontSize = lo;
            const nameH = nameLines.length * nameFontSize * 1.25;
            const dateH = hasDate ? (birthStr && deathStr ? 2 : 1) * dateFontSize * 1.3 + nameFontSize * 0.25 : 0;

            let curY = det.cy - (nameH + dateH) / 2 + nameFontSize * 0.85;
            ctx.save(); ctx.textAlign = 'center'; ctx.fillStyle = '#1a1a1a';
            ctx.font = `bold ${nameFontSize}px Georgia, serif`;
            for (const line of nameLines) { ctx.fillText(line, det.cx, curY, textW); curY += nameFontSize * 1.25; }
            if (hasDate) {
                curY += nameFontSize * 0.25; ctx.font = `italic ${dateFontSize}px Georgia, serif`; ctx.fillStyle = '#2c2c2c';
                if (birthStr) { ctx.fillText(birthStr, det.cx, curY, textW); curY += dateFontSize * 1.3; }
                if (deathStr) { ctx.fillText(deathStr, det.cx, curY, textW); }
            }
            ctx.restore();
        }

        function validateDetectedBoxes(deduped) {
            const { total, perGen } = getExpectedBoxCounts();
            if (deduped.length !== total) return { valid: false, reason: `Verarbeitungsabweichung: Kontrollwerte unvollständig.` };
            const detRows = clusterDetectedBoxesIntoRows(deduped);
            const lineageMode = document.getElementById('lineage-mode').value;
            const expectedPerGen = lineageMode === 'ancestors' ? [...perGen].reverse() : [...perGen];

            if (detRows.length !== expectedPerGen.length) return { valid: false, reason: `Ebenenfehler erkannt.` };
            for (let i = 0; i < detRows.length; i++) {
                if (detRows[i].boxes.length !== expectedPerGen[i]) return { valid: false, reason: `Asymmetrie in Generation ${i + 1}.` };
            }
            return { valid: true, reason: '' };
        }

        function compositeTextIntoBoxes(aiUrl, deduped, aiW, aiH) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => {
                    try {
                        const showDates = document.getElementById('show-dates').checked;
                        const finalCanvas = document.createElement('canvas');
                        finalCanvas.width = aiW; finalCanvas.height = aiH;
                        const fCtx = finalCanvas.getContext('2d');
                        fCtx.drawImage(img, 0, 0);

                        const ERASE_RADIUS = 10;
                        for (const det of deduped) {
                            const rx1 = Math.max(0, Math.floor(det.x - ERASE_RADIUS));
                            const ry1 = Math.max(0, Math.floor(det.y - ERASE_RADIUS));
                            const rx2 = Math.min(aiW - 1, Math.ceil(det.x + det.w + ERASE_RADIUS));
                            const ry2 = Math.min(aiH - 1, Math.ceil(det.y + det.h + ERASE_RADIUS));
                            const regionData = fCtx.getImageData(rx1, ry1, rx2 - rx1 + 1, ry2 - ry1 + 1);
                            const px = regionData.data;

                            for (let i = 0; i < px.length; i += 4) {
                                if (px[i] > 150 && px[i+1] < 100 && px[i+2] < 100) {
                                    px[i] = 255; px[i+1] = 255; px[i+2] = 255;
                                }
                            }
                            fCtx.putImageData(regionData, rx1, ry1);
                        }

                        const EXPAND = 3;
                        const detRows = clusterDetectedBoxesIntoRows(deduped);
                        const nodesByDepth = {};
                        for (const n of currentNodes) {
                            if (!nodesByDepth[n.depth]) nodesByDepth[n.depth] = [];
                            nodesByDepth[n.depth].push(n);
                        }
                        const nodeRows = Object.keys(nodesByDepth).map(Number).sort((a, b) => a - b).map(depth => {
                            const row = nodesByDepth[depth]; row.sort((a, b) => a.svgX - b.svgX); return row;
                        });

                        if (document.getElementById('lineage-mode').value === 'ancestors') nodeRows.reverse();

                        for (let gi = 0; gi < detRows.length; gi++) {
                            const detBoxes = detRows[gi].boxes; const svgGen = nodeRows[gi];
                            if (!svgGen) break;
                            for (let bi = 0; bi < detBoxes.length; bi++) {
                                const det = detBoxes[bi]; const node = svgGen[bi];
                                if (!node) break;
                                fCtx.fillStyle = '#ffffff';
                                fCtx.fillRect(det.x - EXPAND, det.y - EXPAND, det.w + EXPAND*2, det.h + EXPAND*2);
                                drawNodeTextToCanvas(fCtx, det, node.data, showDates);
                            }
                        }
                        resolve(finalCanvas.toDataURL('image/png'));
                    } catch (err) { reject(err); }
                };
                img.src = aiUrl;
            });
        }

        function applyColorToBoxes(imageUrl, color) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => {
                    try {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);

                        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const data = imageData.data;

                        const r = parseInt(color.slice(1, 3), 16);
                        const g = parseInt(color.slice(3, 5), 16);
                        const b = parseInt(color.slice(5, 7), 16);

                        for (let i = 0; i < data.length; i += 4) {
                            if (data[i] > 240 && data[i + 1] > 240 && data[i + 2] > 240) {
                                data[i] = r; data[i + 1] = g; data[i + 2] = b;
                            }
                        }
                        ctx.putImageData(imageData, 0, 0);
                        resolve(canvas.toDataURL('image/png'));
                    } catch (err) { reject(err); }
                };
                img.src = imageUrl;
            });
        }

        let _lastRawAiUrl = null;
        let _lastDetection = null;

        async function callBackendGemini(prompt, imageBase64, imageMime) {
            const response = await fetch('/api/transform-design', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt, svgSnapshot: imageBase64 })
            });
            if (!response.ok) throw new Error('Backend-KI-Transformation fehlgeschlagen.');
            const data = await response.json();
            const imgPart = data?.candidates?.[0]?.content?.parts?.find(p => p.inlineData?.mimeType?.startsWith('image/'));
            if (!imgPart) throw new Error('Kein Bild in der Antwort.');
            return `data:${imgPart.inlineData.mimeType};base64,${imgPart.inlineData.data}`;
        }

        function showFinalResult(compositedUrl) {
            const statusTxt = document.getElementById('ai-status');
            const imgResult = document.getElementById('ai-image-result');
            const debugImg = document.getElementById('ai-debug-result');
            const debugInfo = document.getElementById('debug-info');
            const loader = document.getElementById('loader');
            const applyBtn = document.getElementById('apply-text-btn');
            const applyColorBtn = document.getElementById('apply-color-btn');
            const dlBtn = document.getElementById('download-btn');
            const editBtn = document.getElementById('edit-btn');
            const editCfm = document.getElementById('edit-confirm-btn');
            const editArea = document.getElementById('edit-area');
            const closeBtn = document.getElementById('close-overlay');
            const colorPaletteContainer = document.getElementById('color-palette-container');

            loader.style.display = 'none'; debugImg.style.display = 'none'; debugInfo.style.display = 'none';
            applyBtn.style.display = 'none'; editCfm.style.display = 'none'; editArea.style.display = 'none';

            imgResult.src = compositedUrl; imgResult.style.display = 'block';
            finalCompositedImage = compositedUrl;

            statusTxt.textContent = 'Extrahiere Farbprofile...';
            const img = new Image();
            img.onload = async () => {
                try {
                    dominantColors = await extractDominantColors(img, 5);
                    updateColorPalette(dominantColors);
                    colorPaletteContainer.style.display = 'flex';
                    statusTxt.textContent = '✨ Ihr historisches Meisterwerk ist fertig!';
                    applyColorBtn.style.display = 'block'; dlBtn.style.display = 'block';
                    editBtn.style.display = 'block'; closeBtn.style.display = 'block';
                } catch (err) {
                    dlBtn.style.display = 'block'; closeBtn.style.display = 'block';
                }
            };
            img.src = compositedUrl;

            applyColorBtn.onclick = async () => {
                applyColorBtn.style.display = 'none'; loader.style.display = 'block';
                statusTxt.textContent = 'Farbe wird auf Layout übertragen...';
                try {
                    const coloredImageUrl = await applyColorToBoxes(finalCompositedImage, selectedBoxColor);
                    finalCompositedImage = coloredImageUrl; imgResult.src = coloredImageUrl;
                    loader.style.display = 'none'; statusTxt.textContent = 'Farben erfolgreich harmonisiert!';
                    dlBtn.style.display = 'block'; closeBtn.style.display = 'block';
                } catch (err) {
                    loader.style.display = 'none'; dlBtn.style.display = 'block'; closeBtn.style.display = 'block';
                }
            };

            dlBtn.onclick = () => { const a = document.createElement('a'); a.href = finalCompositedImage; a.download = 'stammbaum_studio.png'; a.click(); };
            editBtn.onclick = () => { editArea.style.display = 'flex'; editCfm.style.display = 'block'; editBtn.style.display = 'none'; document.getElementById('edit-prompt').focus(); };

            editCfm.onclick = async () => {
                const userPrompt = document.getElementById('edit-prompt').value.trim();
                if (!userPrompt) return;

                editArea.style.display = 'none'; editCfm.style.display = 'none'; dlBtn.style.display = 'none';
                editBtn.style.display = 'none'; closeBtn.style.display = 'none'; imgResult.style.display = 'none';
                colorPaletteContainer.style.display = 'none'; loader.style.display = 'block';
                statusTxt.textContent = 'Berechne neue Stil-Instruktionen...';

                try {
                    const b64resp = await fetch(_lastRawAiUrl);
                    const blob = await b64resp.blob();
                    const base64 = await new Promise(res => { const r = new FileReader(); r.onload = () => res(r.result.split(',')[1]); r.readAsDataURL(blob); });
                    const editPromptFull = `${userPrompt}. Important: paint the interior fill of EVERY rectangular box in the family tree with solid pure red color #FF0000 (RGB 255,0,0) — no text or patterns inside the boxes, only solid red fill. Keep all box positions and sizes unchanged.`;

                    let newAiUrl = await callBackendGemini(editPromptFull, base64, blob.type || 'image/png');
                    let detection = await detectRedBoxes(newAiUrl);

                    _lastRawAiUrl = newAiUrl; _lastDetection = detection;
                    loader.style.display = 'none';
                    const compositedUrl = await compositeTextIntoBoxes(_lastRawAiUrl, _lastDetection.deduped, _lastDetection.aiW, _lastDetection.aiH);
                    showFinalResult(compositedUrl);
                } catch (err) {
                    loader.style.display = 'none'; statusTxt.textContent = 'Änderung fehlgeschlagen.'; closeBtn.style.display = 'block';
                }
            };
        }

        document.getElementById('design-btn').addEventListener('click', async () => {
            if (activeDescendants.length === 0) { alert('Bitte generieren Sie zuerst den Basis-Stammbaum (Schritt 2).'); return; }
            const stylePrompt = hiddenStylePrompt.value.trim();
            if (!stylePrompt) { alert('Bitte wählen Sie einen Designstil in Schritt 3.'); return; }

            const overlay = document.getElementById('ai-overlay');
            const statusTxt = document.getElementById('ai-status');
            const imgResult = document.getElementById('ai-image-result');
            const debugImg = document.getElementById('ai-debug-result');
            const debugInfo = document.getElementById('debug-info');
            const loader = document.getElementById('loader');
            const closeBtn = document.getElementById('close-overlay');
            const applyBtn = document.getElementById('apply-text-btn');
            const dlBtn = document.getElementById('download-btn');
            const editBtn = document.getElementById('edit-btn');
            const editCfm = document.getElementById('edit-confirm-btn');
            const editArea = document.getElementById('edit-area');
            const colorPaletteContainer = document.getElementById('color-palette-container');

            overlay.style.display = 'flex'; imgResult.style.display = 'none'; debugImg.style.display = 'none';
            debugInfo.style.display = 'none'; applyBtn.style.display = 'none'; dlBtn.style.display = 'none';
            editBtn.style.display = 'none'; editCfm.style.display = 'none'; editArea.style.display = 'none';
            colorPaletteContainer.style.display = 'none'; closeBtn.style.display = 'none'; loader.style.display = 'block';

            try {
                statusTxt.textContent = 'Analysiere geometrische Struktur des Stammbaums...';
                const { base64: imgBase64, mimeType: imgMimeType } = await svgToPngBase64(svgElement, 800, true);
                const finalPrompt = `${stylePrompt}. The image shows a family tree with rectangular boxes connected by lines. Apply the artistic style to the ENTIRE image — background, borders, connecting lines, decorations. IMPORTANT: paint the interior fill of EVERY rectangular box with solid pure red color #FF0000 (RGB 255,0,0). Do NOT put any text, patterns, or other colors inside the boxes — only solid #FF0000 fill inside each box interior. Keep all box positions and sizes unchanged. Output a high quality image.`;

                statusTxt.textContent = 'Malerische Rekonstruktion via KI wird ausgeführt...';
                const aiUrl = await callBackendGemini(finalPrompt, imgBase64, imgMimeType);

                statusTxt.textContent = 'Richte Textebenen mathematisch aus...';
                const detection = await detectRedBoxes(aiUrl);
                const validation = validateDetectedBoxes(detection.deduped);

                if (!validation.valid) {
                    loader.style.display = 'none'; statusTxt.textContent = 'Fehler beim Geometrie-Mapping. Bitte verändern Sie leicht die Skalierung.'; closeBtn.style.display = 'block'; return;
                }

                _lastRawAiUrl = aiUrl; _lastDetection = detection;
                const compositedUrl = await compositeTextIntoBoxes(_lastRawAiUrl, _lastDetection.deduped, _lastDetection.aiW, _lastDetection.aiH);
                showFinalResult(compositedUrl);
            } catch (err) {
                loader.style.display = 'none'; statusTxt.textContent = 'Verbindungsfehler zur Creative Engine.'; closeBtn.style.display = 'block';
            }
        });

        document.getElementById('close-overlay').addEventListener('click', () => { document.getElementById('ai-overlay').style.display = 'none'; });

        // --- EXPORT FUNKTIONEN & CHECKOUT ---
        document.getElementById('export-svg').onclick = () => {
            const svgData = new XMLSerializer().serializeToString(svgElement);
            const blob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url; link.download = 'stammbaum.svg'; link.click();
        };

        document.getElementById('export-png').onclick = async () => {
            try {
                const { base64, mimeType } = await svgToPngBase64(svgElement, 2048, false);
                const link = document.createElement('a'); link.href = `data:${mimeType};base64,${base64}`; link.download = 'stammbaum.png'; link.click();
            } catch (e) { alert('Export fehlgeschlagen.'); }
        };

        document.getElementById('checkout-btn').onclick = () => {
            if (!finalCompositedImage) {
                alert('Bitte transformiere zuerst dein Design mit der KI (Schritt 3), um es kaufen zu können!');
                return;
            }
            localStorage.setItem('finalTreeImage', finalCompositedImage);
            window.location.href = 'checkout.html';
        };

        updateT();
    });
    </script>
